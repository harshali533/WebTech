<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Experiment 3 - Form Validation</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #dbeafe, #bfdbfe, #93c5fd);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 360px;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2563eb;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #3b82f6, #2563eb);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }

        .error {
            color: #dc2626;
            font-size: 13px;
            margin: 0;
        }

        .success {
            color: #16a34a;
            font-size: 15px;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 id="formTitle">Registration Form</h2>

        <form id="myForm">

            <input type="text" id="name" placeholder="Enter Name">
            <p id="nameError" class="error"></p>

            <input type="email" id="email" placeholder="Enter Email">
            <p id="emailError" class="error"></p>

            <input type="password" id="password" placeholder="Enter Password">
            <p id="passwordError" class="error"></p>

            <button type="submit">Submit</button>

        </form>

        <p id="successMsg" class="success"></p>
    </div>

    <script src="exp3.js"></script>

</body>
</html>
